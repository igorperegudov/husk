name: Release

# Publishes @elisym/husk to npm when its version in packages/cli/package.json is
# bumped on main. Runs only after CI (bun qa) has succeeded, and is idempotent:
# it skips when a git tag for the current version already exists, so a normal
# push that does not touch the version is a no-op.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  release:
    name: Release @elisym/husk
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write # push the version tag + create the GitHub Release
      id-token: write # OIDC trusted publishing + provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Setup Node (npm >= 11.5.1 required for Trusted Publishing)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

      - name: Publish @elisym/husk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PKG_DIR="packages/cli"
          PKG_NAME="@elisym/husk"
          VERSION="$(node -p "require('./${PKG_DIR}/package.json').version")"
          TAG="${PKG_NAME}@${VERSION}"

          echo "--- ${TAG} ---"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists - nothing to publish."
            exit 0
          fi

          echo "Publishing ${TAG} to npm..."
          (cd "${PKG_DIR}" && npm publish --provenance --access public)

          echo "Tagging ${TAG}..."
          git tag "${TAG}"
          git push origin "${TAG}"

          echo "Creating GitHub Release ${TAG}..."
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            --verify-tag
